<html>
<body>
<pre id="out">Loading...</pre>
<script>

fetch('content://ru.alfastrah.app.easyphotopicker.fileprovider/root/data/data/ru.alfastrah.app/databases/alfa_db')
  .then(r => r.arrayBuffer())
  .then(buffer => {
    console.log("Размер файла в байтах:", buffer.byteLength);

    const bytes = new Uint8Array(buffer);
    let preview = "";
    for(let i=0; i<100; i++) preview += bytes[i].toString(16) + " ";
    document.getElementById('out').innerText = "HEX Preview: " + preview;
  });
</script>
</body>
</html>
